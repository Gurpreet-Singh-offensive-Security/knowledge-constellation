<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Knowledge Constellation Explorer</title>
<script src="https://d3js.org/d3.v7.min.js"></script>
<style>
  :root {
    --bg: #060913;
    --panel: rgba(10, 15, 30, 0.78);
    --accent: #58a6ff;
    --accent2: #79c0ff;
    --line: #30363d;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; padding: 0; width: 100vw; height: 100vh;
    background-color: var(--bg); color: #c9d1d9;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    overflow: hidden; position: relative;
  }
  .stars-bg {
    position: absolute; top: 0; left: 0; width: 100%; height: 100%;
    background: radial-gradient(circle at 50% 50%, #0d162d 0%, #060913 100%);
    z-index: 0; overflow: hidden;
  }
  .star {
    position: absolute; background-color: white; border-radius: 50%;
    box-shadow: 0 0 6px rgba(255,255,255,0.8);
    animation: twinkle infinite alternate ease-in-out;
  }
  @keyframes twinkle {
    0% { opacity: 0.1; transform: scale(0.8); }
    100% { opacity: 1; transform: scale(1.3); }
  }

  /* Control panel */
  #ui-panel {
    position: absolute; top: 50%; left: 50%;
    transform: translate(-50%, -50%); width: 360px; max-width: 92vw;
    background: var(--panel); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 24px; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 15px rgba(88,166,255,0.2);
    border: 1px solid rgba(88,166,255,0.25); z-index: 10;
    transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1);
  }
  #ui-panel.shifted { top: 20px; left: 20px; transform: translate(0,0); width: 300px; }

  /* Info / detail panel */
  #info-panel {
    position: absolute; top: 20px; right: 20px; width: 380px; max-width: 92vw;
    background: rgba(10,15,30,0.9); backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
    padding: 22px; border-radius: 16px;
    box-shadow: 0 8px 32px rgba(0,0,0,0.7), 0 0 20px rgba(31,111,235,0.3);
    border: 1px solid rgba(31,111,235,0.35); z-index: 10; display: none;
    max-height: 88vh; overflow-y: auto;
  }
  h2 { margin: 0 0 6px; font-size: 1.25rem; color: var(--accent); font-weight: 600; letter-spacing: 0.3px; }
  .muted { font-size: 0.8rem; color: #8b949e; }
  label { font-size: 0.78rem; color: #8b949e; display: block; margin: 12px 0 4px; }

  input[type="text"], input[type="password"], select, textarea {
    width: 100%; padding: 11px; margin: 2px 0; background: rgba(1,4,9,0.6);
    border: 1px solid var(--line); color: #fff; border-radius: 8px; transition: 0.25s;
    font-family: inherit; font-size: 0.9rem;
  }
  textarea { resize: vertical; min-height: 80px; }
  input:focus, select:focus, textarea:focus { border-color: var(--accent); outline: none; box-shadow: 0 0 8px rgba(88,166,255,0.3); }

  button {
    width: 100%; padding: 11px; background: linear-gradient(135deg, #1f6feb 0%, #1152b3 100%);
    color: #fff; border: none; border-radius: 8px; cursor: pointer; font-weight: 600; font-size: 0.9rem;
    transition: 0.25s; box-shadow: 0 4px 12px rgba(31,111,235,0.3); margin-top: 10px;
  }
  button:hover { background: linear-gradient(135deg, #388bfd 0%, #1f6feb 100%); box-shadow: 0 4px 18px rgba(56,139,253,0.5); transform: translateY(-1px); }
  button.ghost { background: #21262d; box-shadow: none; }
  button.ghost:hover { background: #2d333b; transform: none; box-shadow: none; }
  .btn-row { display: flex; gap: 8px; }
  .btn-row button { margin-top: 10px; }

  #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
  .links line { stroke: #444d56; stroke-opacity: 0.45; stroke-width: 1.5px; }
  .nodes circle { cursor: pointer; transition: r 0.2s, stroke 0.2s; }
  .nodes circle:hover { stroke: #fff; stroke-width: 2px; }
  .node-label { font-size: 13px; fill: #adbac7; font-weight: 500; pointer-events: none; text-shadow: 0 2px 4px rgba(0,0,0,0.85); }

  #loading { display: none; color: #8b949e; margin-top: 12px; font-size: 0.85rem; text-align: center; font-style: italic; }
  #err { display:none; margin-top:10px; padding:10px; border-radius:8px; background:rgba(248,81,73,0.12); border:1px solid rgba(248,81,73,0.4); color:#ff7b72; font-size:0.8rem; }
  .badge { display:inline-block; font-size:0.7rem; padding:2px 8px; border-radius:20px; background:rgba(88,166,255,0.15); color:var(--accent); margin-bottom:8px; }
  .hint { position:absolute; bottom:14px; left:50%; transform:translateX(-50%); z-index:5; font-size:0.75rem; color:#6e7681; background:rgba(10,15,30,0.6); padding:6px 14px; border-radius:20px; backdrop-filter:blur(6px); }
  a { color: var(--accent); }
  .saved-note { margin-top:12px; padding:10px; border-radius:8px; background:rgba(63,185,80,0.08); border:1px solid rgba(63,185,80,0.3); font-size:0.85rem; white-space:pre-wrap; display:none; }
</style>
</head>
<body>
  <div class="stars-bg" id="star-container"></div>

  <!-- Control panel -->
  <div id="ui-panel">
    <h2>🌌 Constellation Explorer</h2>
    <p class="muted" style="margin:4px 0 8px;">Pick any topic — IT, healthcare, security, anything. AI maps it into a star map you can explore, expand, and annotate.</p>

    <label>Gemini API key (free — <a href="https://aistudio.google.com/apikey" target="_blank">get one here</a>)</label>
    <input type="password" id="api-key" placeholder="AIza..." />

    <label>Model</label>
    <select id="model-select">
      <option value="gemini-2.5-flash">gemini-2.5-flash (recommended, free)</option>
      <option value="gemini-2.5-flash-lite">gemini-2.5-flash-lite (fastest)</option>
      <option value="gemini-2.0-flash">gemini-2.0-flash</option>
      <option value="gemini-2.5-pro">gemini-2.5-pro (deeper, may need paid)</option>
    </select>

    <label>What do you want to learn?</label>
    <input type="text" id="topic-input" placeholder="e.g. HTTP authentication, sepsis pathophysiology..." />

    <button onclick="generateGraph()">✨ Map Concept</button>
    <div class="btn-row">
      <button class="ghost" onclick="saveConstellation()">💾 Save</button>
      <button class="ghost" onclick="loadConstellation()">📂 Load</button>
    </div>
    <div id="loading">✨ Mapping galaxy configurations...</div>
    <div id="err"></div>
  </div>

  <!-- Info panel -->
  <div id="info-panel">
    <span class="badge" id="info-group">node</span>
    <h2 id="info-title">Concept Node</h2>
    <p id="info-desc" style="font-size:0.92rem; line-height:1.6; color:#adbac7;"></p>

    <div class="saved-note" id="saved-note"></div>

    <label>📝 Your notes (saved to this browser)</label>
    <textarea id="note-input" placeholder="Write your own understanding, mnemonics, gotchas..."></textarea>
    <button class="ghost" onclick="saveNote()">Save note</button>

    <button onclick="expandNode()">🔭 Expand this node (dig deeper)</button>
    <button class="ghost" onclick="closeInfo()">Close</button>
  </div>

  <div id="graph-container"></div>
  <div class="hint">Click a star = details &nbsp;•&nbsp; Drag = move &nbsp;•&nbsp; Scroll = zoom &nbsp;•&nbsp; Double-click a star = expand</div>

<script>
/* ---------------- Background stars ---------------- */
(function generateBackgroundStars(){
  const c = document.getElementById('star-container');
  for (let i=0;i<150;i++){
    const s=document.createElement('div'); s.className='star';
    s.style.left=Math.random()*100+'vw'; s.style.top=Math.random()*100+'vh';
    const size=Math.random()*2+1; s.style.width=size+'px'; s.style.height=size+'px';
    s.style.animationDuration=(Math.random()*3+2)+'s'; s.style.animationDelay=(Math.random()*3)+'s';
    c.appendChild(s);
  }
})();

/* ---------------- State ---------------- */
let simulation, svg, g, link, node, labels;
let graphData = { nodes: [], links: [] };
let selectedNode = null;
const width = window.innerWidth, height = window.innerHeight;

/* ---------------- SVG setup ---------------- */
svg = d3.select("#graph-container").append("svg").attr("width", width).attr("height", height);
const defs = svg.append("defs");
const filter = defs.append("filter").attr("id","glow").attr("x","-50%").attr("y","-50%").attr("width","200%").attr("height","200%");
filter.append("feGaussianBlur").attr("stdDeviation","3.5").attr("result","coloredBlur");
const feMerge = filter.append("feMerge");
feMerge.append("feMergeNode").attr("in","coloredBlur");
feMerge.append("feMergeNode").attr("in","SourceGraphic");
g = svg.append("g");
const zoom = d3.zoom().scaleExtent([0.15,4]).on("zoom", e => g.attr("transform", e.transform));
svg.call(zoom);

/* ---------------- Helpers ---------------- */
function showErr(msg){ const e=document.getElementById('err'); e.style.display='block'; e.innerHTML=msg; }
function hideErr(){ document.getElementById('err').style.display='none'; }
function setLoading(on){ document.getElementById('loading').style.display = on ? 'block' : 'none'; }

function colorFor(group){
  if (group === 1) return "#79c0ff";   // central
  if (group === 2) return "#58a6ff";   // major
  return "#a371f7";                    // deeper / expanded
}
function radiusFor(group){ return group === 1 ? 18 : group === 2 ? 10 : 7; }

/* ---------------- Gemini call ---------------- */
async function callGemini(prompt){
  const apiKey = document.getElementById('api-key').value.trim();
  const model  = document.getElementById('model-select').value;
  if (!apiKey) throw new Error("NO_KEY");

  const url = `https://generativelanguage.googleapis.com/v1beta/models/${model}:generateContent`;
  const res = await fetch(url, {
    method: 'POST',
    headers: { 'Content-Type': 'application/json', 'x-goog-api-key': apiKey },
    body: JSON.stringify({
      contents: [{ parts: [{ text: prompt }] }],
      generationConfig: { responseMimeType: "application/json", temperature: 0.4 }
    })
  });

  if (!res.ok){
    const t = await res.text();
    if (res.status === 400 && /API key not valid/i.test(t)) throw new Error("BAD_KEY");
    if (res.status === 404) throw new Error("BAD_MODEL");
    if (res.status === 429) throw new Error("RATE_LIMIT");
    throw new Error("HTTP_" + res.status + ": " + t.slice(0,200));
  }
  const data = await res.json();
  let text = data?.candidates?.[0]?.content?.parts?.[0]?.text;
  if (!text) throw new Error("EMPTY");
  text = text.replace(/```json/gi,'').replace(/```/g,'').trim();
  return JSON.parse(text);
}

function explainError(err){
  switch(err.message){
    case "NO_KEY":    return "Please enter your free Gemini API key first. <a href='https://aistudio.google.com/apikey' target='_blank'>Get one</a>.";
    case "BAD_KEY":   return "That API key was rejected. Copy it again from <a href='https://aistudio.google.com/apikey' target='_blank'>Google AI Studio</a>.";
    case "BAD_MODEL": return "That model isn't available on your key. Try <b>gemini-2.5-flash</b> in the Model dropdown.";
    case "RATE_LIMIT":return "Free-tier rate limit hit (a few requests/min). Wait ~30s and try again.";
    case "EMPTY":     return "The model returned nothing (possibly a safety block). Try rewording the topic.";
    default:
      if (err instanceof SyntaxError) return "The AI returned text that wasn't clean JSON. Try again or switch model.";
      return "Something went wrong: " + err.message;
  }
}

/* ---------------- Generate main graph ---------------- */
async function generateGraph(){
  const topic = document.getElementById('topic-input').value.trim();
  hideErr();
  if (!topic){ showErr("Type a topic to explore."); return; }

  document.getElementById('ui-panel').classList.add('shifted');
  setLoading(true);

  const prompt = `You are an expert instructor who can teach ANY domain (IT, security, healthcare, finance, biology, etc.).
Map the concept: "${topic}".
Break it into a CENTRAL node (group 1), several MAJOR components/structures (group 2), and the granular MINOR
parameters/attributes/headers/mechanisms under each major one (group 3).
Write descriptions in clear, simple language a motivated beginner can understand, but keep them technically precise.
Aim for roughly 12-22 nodes total.

Return ONLY valid JSON (no markdown, no code fences) in exactly this shape:
{
  "nodes": [
    {"id": "Central Topic", "group": 1, "description": "..."},
    {"id": "Major Component", "group": 2, "description": "..."},
    {"id": "Minor Parameter", "group": 3, "description": "..."}
  ],
  "links": [
    {"source": "Central Topic", "target": "Major Component"},
    {"source": "Major Component", "target": "Minor Parameter"}
  ]
}
Every id must be unique. Every link source/target must match an existing node id.`;

  try {
    const data = await callGemini(prompt);
    if (!data.nodes || !data.links) throw new Error("Bad shape");
    graphData = data;
    mergeNotes();
    renderGraph();
  } catch(err){
    console.error(err);
    showErr(explainError(err));
    document.getElementById('ui-panel').classList.remove('shifted');
  } finally {
    setLoading(false);
  }
}

/* ---------------- Expand a node ---------------- */
async function expandNode(){
  if (!selectedNode) return;
  hideErr();
  setLoading(true);
  const parent = selectedNode;
  const prompt = `Within the broader subject, dig deeper into ONLY this specific concept: "${parent.id}".
Context/description: "${parent.description || ''}".
Generate 4-7 NEW granular child concepts (sub-parameters, edge cases, related mechanisms) that branch off it.
Use clear simple-but-precise language. Do NOT repeat the parent. Each id must be unique and NOT already common.
Return ONLY valid JSON (no markdown):
{
  "nodes": [ {"id": "Child Concept", "group": 3, "description": "..."} ],
  "links": [ {"source": "${parent.id}", "target": "Child Concept"} ]
}`;
  try {
    const data = await callGemini(prompt);
    const existing = new Set(graphData.nodes.map(n => n.id));
    (data.nodes||[]).forEach(n => { if(!existing.has(n.id)){ graphData.nodes.push(n); existing.add(n.id); }});
    (data.links||[]).forEach(l => {
      const s = typeof l.source==='object'?l.source.id:l.source;
      const t = typeof l.target==='object'?l.target.id:l.target;
      if (existing.has(s) && existing.has(t)) graphData.links.push({source:s, target:t});
    });
    mergeNotes();
    renderGraph();
  } catch(err){
    console.error(err);
    showErr(explainError(err));
  } finally {
    setLoading(false);
  }
}

/* ---------------- Render ---------------- */
function renderGraph(){
  g.selectAll("*").remove();

  simulation = d3.forceSimulation(graphData.nodes)
    .force("link", d3.forceLink(graphData.links).id(d=>d.id).distance(d=> (d.target.group===3?90:150)))
    .force("charge", d3.forceManyBody().strength(-420))
    .force("center", d3.forceCenter(width/2, height/2))
    .force("collide", d3.forceCollide().radius(d=>radiusFor(d.group)+18));

  link = g.append("g").attr("class","links").selectAll("line")
    .data(graphData.links).enter().append("line");

  node = g.append("g").attr("class","nodes").selectAll("circle")
    .data(graphData.nodes).enter().append("circle")
    .attr("r", d=>radiusFor(d.group))
    .attr("fill", d=>colorFor(d.group))
    .attr("filter","url(#glow)")
    .style("opacity", d=> d.group===1?1:0.9)
    .call(drag(simulation))
    .on("click", showInfo)
    .on("dblclick", (e,d)=>{ selectedNode=d; expandNode(); });

  labels = g.append("g").selectAll("text")
    .data(graphData.nodes).enter().append("text")
    .attr("class","node-label").text(d=>d.id)
    .attr("dx", d=>radiusFor(d.group)+6).attr("dy",4);

  simulation.on("tick", ()=>{
    link.attr("x1",d=>d.source.x).attr("y1",d=>d.source.y)
        .attr("x2",d=>d.target.x).attr("y2",d=>d.target.y);
    node.attr("cx",d=>d.x).attr("cy",d=>d.y);
    labels.attr("x",d=>d.x).attr("y",d=>d.y);
  });
}

/* ---------------- Info panel + notes ---------------- */
function showInfo(event, d){
  selectedNode = d;
  document.getElementById("info-group").innerText = d.group===1?"central":d.group===2?"major":"detail";
  document.getElementById("info-title").innerText = d.id;
  document.getElementById("info-desc").innerText = d.description || "(no description)";
  const noteBox = document.getElementById("note-input");
  noteBox.value = d.note || "";
  const saved = document.getElementById("saved-note");
  if (d.note){ saved.style.display='block'; saved.innerText="Saved note:\n"+d.note; } else { saved.style.display='none'; }
  document.getElementById("info-panel").style.display = "block";
}
function closeInfo(){ document.getElementById("info-panel").style.display="none"; }

function saveNote(){
  if (!selectedNode) return;
  selectedNode.note = document.getElementById("note-input").value;
  // persist notes by id
  const key = "kc_notes";
  const all = JSON.parse(localStorage.getItem(key) || "{}");
  all[selectedNode.id] = selectedNode.note;
  localStorage.setItem(key, JSON.stringify(all));
  const saved = document.getElementById("saved-note");
  if (selectedNode.note){ saved.style.display='block'; saved.innerText="Saved note:\n"+selectedNode.note; }
  else { saved.style.display='none'; }
}
function mergeNotes(){
  const all = JSON.parse(localStorage.getItem("kc_notes") || "{}");
  graphData.nodes.forEach(n => { if (all[n.id]) n.note = all[n.id]; });
}

/* ---------------- Save / load whole constellation ---------------- */
function saveConstellation(){
  if (!graphData.nodes.length){ showErr("Nothing to save yet — map a concept first."); return; }
  const slim = {
    nodes: graphData.nodes.map(n=>({id:n.id, group:n.group, description:n.description, note:n.note||""})),
    links: graphData.links.map(l=>({source: l.source.id||l.source, target: l.target.id||l.target})),
    topic: document.getElementById('topic-input').value
  };
  localStorage.setItem("kc_saved", JSON.stringify(slim));
  // also download a file
  const blob = new Blob([JSON.stringify(slim,null,2)], {type:"application/json"});
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = (slim.topic||"constellation").replace(/\s+/g,'_') + ".json";
  a.click();
  hideErr();
}
function loadConstellation(){
  const raw = localStorage.getItem("kc_saved");
  if (!raw){ showErr("No saved constellation in this browser. (Use Save first, or import a .json by drag-drop.)"); return; }
  graphData = JSON.parse(raw);
  document.getElementById('topic-input').value = graphData.topic || "";
  document.getElementById('ui-panel').classList.add('shifted');
  mergeNotes();
  renderGraph();
  hideErr();
}
/* drag & drop a saved .json file onto the page to import */
window.addEventListener('dragover', e=>e.preventDefault());
window.addEventListener('drop', e=>{
  e.preventDefault();
  const f = e.dataTransfer.files[0]; if(!f) return;
  const r = new FileReader();
  r.onload = ()=>{ try{ graphData = JSON.parse(r.result); document.getElementById('ui-panel').classList.add('shifted'); mergeNotes(); renderGraph(); hideErr(); }catch{ showErr("That file wasn't a valid constellation JSON."); } };
  r.readAsText(f);
});

/* ---------------- Drag behaviour ---------------- */
function drag(sim){
  function started(e,d){ if(!e.active) sim.alphaTarget(0.3).restart(); d.fx=d.x; d.fy=d.y; }
  function dragged(e,d){ d.fx=e.x; d.fy=e.y; }
  function ended(e,d){ if(!e.active) sim.alphaTarget(0); d.fx=null; d.fy=null; }
  return d3.drag().on("start",started).on("drag",dragged).on("end",ended);
}

/* persist key locally so you don't retype it */
const keyInput = document.getElementById('api-key');
keyInput.value = localStorage.getItem('kc_key') || '';
keyInput.addEventListener('change', ()=>localStorage.setItem('kc_key', keyInput.value.trim()));
document.getElementById('topic-input').addEventListener('keydown', e=>{ if(e.key==='Enter') generateGraph(); });
</script>
</body>
</html>
