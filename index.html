<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Constellation Explorer</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        /* Deep space background */
        body { 
            margin: 0; 
            padding: 0; 
            background-color: #060913; 
            color: #c9d1d9; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; 
            overflow: hidden; 
            position: relative;
        }

        /* The canvas holding our stars */
        .stars-bg {
            position: absolute;
            top: 0; left: 0; width: 100%; height: 100%;
            background: radial-gradient(circle at 50% 50%, #0d162d 0%, #060913 100%);
            z-index: 0;
            overflow: hidden;
        }

        /* Individual twinkling stars */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            box-shadow: 0 0 6px rgba(255, 255, 255, 0.8);
            animation: twinkle infinite alternate ease-in-out;
        }

        @keyframes twinkle {
            0% { opacity: 0.1; transform: scale(0.8); }
            100% { opacity: 1; transform: scale(1.3); }
        }

        /* Cyberpunk Glassmorphism Floating UI Control Panel */
        #ui-panel { 
            position: absolute; 
            top: 50%; 
            left: 50%; 
            transform: translate(-50%, -50%); /* Centers the panel perfectly */
            width: 340px; 
            background: rgba(10, 15, 30, 0.75); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7), 0 0 15px rgba(88, 166, 255, 0.2); 
            border: 1px solid rgba(88, 166, 255, 0.2); 
            z-index: 10; 
            transition: all 0.6s cubic-bezier(0.25, 1, 0.5, 1); /* Smooth slide animation */
        }

        /* The class applied to slide the panel to the corner */
        #ui-panel.shifted {
            top: 25px;
            left: 25px;
            transform: translate(0, 0);
        }

        /* Floating Info Detail Panel */
        #info-panel { 
            position: absolute; 
            top: 25px; 
            right: 25px; 
            width: 365px; 
            background: rgba(10, 15, 30, 0.85); 
            backdrop-filter: blur(12px);
            -webkit-backdrop-filter: blur(12px);
            padding: 24px; 
            border-radius: 16px; 
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.7), 0 0 20px rgba(31, 111, 235, 0.3); 
            border: 1px solid rgba(31, 111, 235, 0.3); 
            z-index: 10; 
            display: none; 
            max-height: 80vh; 
            overflow-y: auto; 
        }

        h2 { margin-top: 0; font-size: 1.3rem; color: #58a6ff; font-weight: 600; letter-spacing: 0.5px; }
        
        input[type="text"], input[type="password"] { 
            width: 100%; 
            padding: 12px; 
            margin: 10px 0; 
            background: rgba(1, 4, 9, 0.6); 
            border: 1px solid #30363d; 
            color: white; 
            border-radius: 8px; 
            box-sizing: border-box; 
            transition: 0.3s;
        }
        input[type="text"]:focus, input[type="password"]:focus {
            border-color: #58a6ff;
            outline: none;
            box-shadow: 0 0 8px rgba(88, 166, 255, 0.3);
        }

        button { 
            width: 100%; 
            padding: 12px; 
            background: linear-gradient(135deg, #1f6feb 0%, #1152b3 100%); 
            color: white; 
            border: none; 
            border-radius: 8px; 
            cursor: pointer; 
            font-weight: bold; 
            font-size: 0.95rem;
            transition: 0.3s; 
            box-shadow: 0 4px 12px rgba(31, 111, 235, 0.3);
        }
        button:hover { 
            background: linear-gradient(135deg, #388bfd 0%, #1f6feb 100%); 
            box-shadow: 0 4px 18px rgba(56, 139, 253, 0.5);
            transform: translateY(-1px);
        }

        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; z-index: 1; }
        
        /* Subtle constellation lines */
        .links line { stroke: #444d56; stroke-opacity: 0.4; stroke-width: 1.5px; }
        
        /* Glowing Star Nodes */
        .nodes circle { cursor: pointer; transition: 0.3s; }
        
        .node-label { 
            font-size: 13px; 
            fill: #adbac7; 
            font-weight: 500;
            pointer-events: none; 
            text-shadow: 0 2px 4px rgba(0,0,0,0.8);
        }
        
        #loading { display: none; color: #8b949e; margin-top: 12px; font-size: 0.85rem; text-align: center; font-style: italic; }
    </style>
</head>
<body>

    <div class="stars-bg" id="star-container"></div>

    <div id="ui-panel">
        <h2>🌌 Constellation Explorer</h2>
        <p style="font-size: 0.8rem; color: #8b949e; margin-bottom: 15px;">Deep-dive into concepts. Watch parameters connect like cosmic star systems.</p>
        <input type="password" id="api-key" placeholder="Enter free Gemini API Key">
        <input type="text" id="topic-input" placeholder="What do you want to learn?">
        <button onclick="generateGraph()">Map Concept</button>
        <div id="loading">✨ Mapping galaxy configurations...</div>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Concept Node</h2>
        <p id="info-desc" style="font-size: 0.95rem; line-height: 1.6; color: #adbac7;"></p>
        <button onclick="closeInfo()" style="background: #21262d; box-shadow: none; margin-top: 15px;">Close Data Stream</button>
    </div>

    <div id="graph-container"></div>

    <script>
        // --- Star Generation Logic ---
        function generateBackgroundStars() {
            const container = document.getElementById('star-container');
            const starCount = 150; // Adjust this number for more or less stars

            for (let i = 0; i < starCount; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                
                // Random position
                star.style.left = Math.random() * 100 + 'vw';
                star.style.top = Math.random() * 100 + 'vh';
                
                // Random size between 1px and 3px
                const size = Math.random() * 2 + 1;
                star.style.width = size + 'px';
                star.style.height = size + 'px';
                
                // Random twinkle speed and delay
                star.style.animationDuration = (Math.random() * 3 + 2) + 's';
                star.style.animationDelay = (Math.random() * 3) + 's';
                
                container.appendChild(star);
            }
        }
        
        // Run star generator on load
        generateBackgroundStars();
        // ------------------------------

        let simulation, svg, link, node, labels;
        const width = window.innerWidth;
        const height = window.innerHeight;

        svg = d3.select("#graph-container").append("svg")
            .attr("width", width)
            .attr("height", height);

        // Add a neon glow filter for the stars
        const defs = svg.append("defs");
        const filter = defs.append("filter").attr("id", "glow");
        filter.append("feGaussianBlur").attr("stdDeviation", "3.5").attr("result", "coloredBlur");
        const feMerge = filter.append("feMerge");
        feMerge.append("feMergeNode").attr("in", "coloredBlur");
        feMerge.append("feMergeNode").attr("in", "SourceGraphic");

        const g = svg.append("g");

        svg.call(d3.zoom().scaleExtent([0.2, 3]).on("zoom", (event) => {
            g.attr("transform", event.transform);
        }));

        async function generateGraph() {
            const apiKey = document.getElementById('api-key').value.trim();
            const topic = document.getElementById('topic-input').value.trim();
            
            if (!apiKey || !topic) {
                alert("Please provide your Gemini API key and a topic topic to explore.");
                return;
            }

            // Slide UI panel to the top-left corner
            document.getElementById('ui-panel').classList.add('shifted');
            document.getElementById('loading').style.display = 'block';

            const prompt = `You are an expert technical infrastructure and cybersecurity instructor. Map out the concept: "${topic}". 
            Break it down systematically into major structures, and critically, the minor parameters/attributes/headers/mechanisms involved.
            Return ONLY a valid JSON object. Do not wrap it in markdown formatting or code blocks. Just raw clean JSON text.
            Structure:
            {
              "nodes": [
                {"id": "Central Topic", "group": 1, "description": "High-level contextual core..."},
                {"id": "Sub Parameter/Component", "group": 2, "description": "Technical granular deep dive details..."}
              ],
              "links": [
                {"source": "Central Topic", "target": "Sub Parameter/Component"}
              ]
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let textResponse = data.candidates[0].content.parts[0].text;
                textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const graphData = JSON.parse(textResponse);

                renderGraph(graphData);
            } catch (error) {
                console.error(error);
                alert("Failed to map space coordinates. Verify your API Key configuration.");
                // Move panel back if there is an error
                document.getElementById('ui-panel').classList.remove('shifted');
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderGraph(data) {
            g.selectAll("*").remove();

            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(140))
                .force("charge", d3.forceManyBody().strength(-400))
                .force("center", d3.forceCenter(width / 2, height / 2));

            link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(data.links)
                .enter().append("line");

            node = g.append("g")
                .attr("class", "nodes")
                .selectAll("circle")
                .data(data.nodes)
                .enter().append("circle")
                .attr("r", d => d.group === 1 ? 16 : 8)
                .attr("fill", d => d.group === 1 ? "#79c0ff" : "#58a6ff")
                .attr("filter", "url(#glow)") // Applies neon star glow
                .style("opacity", d => d.group === 1 ? 1 : 0.85)
                .call(drag(simulation))
                .on("click", showInfo);

            labels = g.append("g")
                .selectAll("text")
                .data(data.nodes)
                .enter().append("text")
                .attr("class", "node-label")
                .text(d => d.id)
                .attr("dx", 18)
                .attr("dy", 5);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node.attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                labels.attr("x", d => d.x)
                      .attr("y", d => d.y);
            });
        }

        function showInfo(event, d) {
            document.getElementById("info-title").innerText = d.id;
            document.getElementById("info-desc").innerText = d.description;
            document.getElementById("info-panel").style.display = "block";
        }

        function closeInfo() {
            document.getElementById("info-panel").style.display = "none";
        }

        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x; d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x; d.fy = event.y;
            }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
            }
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }
    </script>
</body>
</html>
