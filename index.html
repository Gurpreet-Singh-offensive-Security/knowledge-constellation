<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Knowledge Constellation</title>
    <script src="https://d3js.org/d3.v7.min.js"></script>
    <style>
        body { margin: 0; padding: 0; background-color: #0d1117; color: #c9d1d9; font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif; overflow: hidden; }
        #ui-panel { position: absolute; top: 20px; left: 20px; width: 320px; background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #30363d; z-index: 10; }
        #info-panel { position: absolute; top: 20px; right: 20px; width: 350px; background: rgba(22, 27, 34, 0.9); padding: 20px; border-radius: 12px; box-shadow: 0 4px 15px rgba(0,0,0,0.5); border: 1px solid #30363d; z-index: 10; display: none; max-height: 80vh; overflow-y: auto; }
        h2 { margin-top: 0; font-size: 1.2rem; color: #58a6ff; }
        input[type="text"], input[type="password"] { width: 100%; padding: 10px; margin: 10px 0; background: #010409; border: 1px solid #30363d; color: white; border-radius: 6px; box-sizing: border-box; }
        button { width: 100%; padding: 10px; background: #238636; color: white; border: none; border-radius: 6px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:hover { background: #2ea043; }
        #graph-container { width: 100vw; height: 100vh; position: absolute; top: 0; left: 0; }
        .links line { stroke: #30363d; stroke-opacity: 0.6; }
        .nodes circle { stroke: #fff; stroke-width: 1.5px; cursor: pointer; transition: 0.2s; }
        .nodes circle:hover { stroke: #58a6ff; stroke-width: 3px; }
        .node-label { font-size: 12px; fill: #8b949e; pointer-events: none; }
        #loading { display: none; color: #8b949e; margin-top: 10px; font-size: 0.9rem; text-align: center; }
    </style>
</head>
<body>

    <div id="ui-panel">
        <h2>Constellation Explorer</h2>
        <p style="font-size: 0.8rem; color: #8b949e;">Map out any concept deeply. E.g., "GET /login request authentication flow".</p>
        <input type="password" id="api-key" placeholder="Enter free Gemini API Key">
        <input type="text" id="topic-input" placeholder="What do you want to learn?">
        <button onclick="generateGraph()">Generate Constellation</button>
        <div id="loading">Generating nodes and deep explanations... this takes a moment.</div>
    </div>

    <div id="info-panel">
        <h2 id="info-title">Concept</h2>
        <p id="info-desc" style="font-size: 0.95rem; line-height: 1.5;"></p>
        <button onclick="closeInfo()" style="background: #30363d; margin-top: 15px;">Close</button>
    </div>

    <div id="graph-container"></div>

    <script>
        let simulation, svg, link, node, labels;
        const width = window.innerWidth;
        const height = window.innerHeight;

        // Initialize D3 canvas
        svg = d3.select("#graph-container").append("svg")
            .attr("width", width)
            .attr("height", height);

        const g = svg.append("g");

        // Allow zooming and panning around the galaxy
        svg.call(d3.zoom().on("zoom", (event) => {
            g.attr("transform", event.transform);
        }));

        async function generateGraph() {
            const apiKey = document.getElementById('api-key').value.trim();
            const topic = document.getElementById('topic-input').value.trim();
            
            if (!apiKey || !topic) {
                alert("Please enter both an API key and a topic.");
                return;
            }

            document.getElementById('loading').style.display = 'block';

            const prompt = `You are an expert IT and deep-learning tutor. Map out the concept: "${topic}". 
            Break it down into a central concept, major sub-concepts, and highly detailed minor parameters/functions.
            Return ONLY a valid JSON object. Do not use Markdown formatting or code blocks. Just raw JSON.
            Structure:
            {
              "nodes": [
                {"id": "Central Topic Name", "group": 1, "description": "High-level overview..."},
                {"id": "Sub Concept", "group": 2, "description": "Deep dive explanation..."}
              ],
              "links": [
                {"source": "Central Topic Name", "target": "Sub Concept"}
              ]
            }`;

            try {
                const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-1.5-pro:generateContent?key=${apiKey}`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ contents: [{ parts: [{ text: prompt }] }] })
                });

                const data = await response.json();
                let textResponse = data.candidates[0].content.parts[0].text;
                
                // Clean up any accidental markdown the AI might output
                textResponse = textResponse.replace(/```json/g, '').replace(/```/g, '').trim();
                const graphData = JSON.parse(textResponse);

                renderGraph(graphData);
            } catch (error) {
                console.error(error);
                alert("Error generating graph. Check your API key or try a different topic.");
            } finally {
                document.getElementById('loading').style.display = 'none';
            }
        }

        function renderGraph(data) {
            g.selectAll("*").remove(); // Clear previous stars

            simulation = d3.forceSimulation(data.nodes)
                .force("link", d3.forceLink(data.links).id(d => d.id).distance(150))
                .force("charge", d3.forceManyBody().strength(-300))
                .force("center", d3.forceCenter(width / 2, height / 2));

            link = g.append("g")
                .attr("class", "links")
                .selectAll("line")
                .data(data.links)
                .enter().append("line");

            node = g.append("g")
                .attr("class", "nodes")
                .selectAll("circle")
                .data(data.nodes)
                .enter().append("circle")
                .attr("r", d => d.group === 1 ? 15 : 8)
                .attr("fill", d => d.group === 1 ? "#58a6ff" : "#1f6feb")
                .call(drag(simulation))
                .on("click", showInfo);

            labels = g.append("g")
                .selectAll("text")
                .data(data.nodes)
                .enter().append("text")
                .attr("class", "node-label")
                .text(d => d.id)
                .attr("dx", 15)
                .attr("dy", 4);

            simulation.on("tick", () => {
                link.attr("x1", d => d.source.x)
                    .attr("y1", d => d.source.y)
                    .attr("x2", d => d.target.x)
                    .attr("y2", d => d.target.y);

                node.attr("cx", d => d.x)
                    .attr("cy", d => d.y);

                labels.attr("x", d => d.x)
                      .attr("y", d => d.y);
            });
        }

        function showInfo(event, d) {
            document.getElementById("info-title").innerText = d.id;
            document.getElementById("info-desc").innerText = d.description;
            document.getElementById("info-panel").style.display = "block";
        }

        function closeInfo() {
            document.getElementById("info-panel").style.display = "none";
        }

        function drag(simulation) {
            function dragstarted(event, d) {
                if (!event.active) simulation.alphaTarget(0.3).restart();
                d.fx = d.x; d.fy = d.y;
            }
            function dragged(event, d) {
                d.fx = event.x; d.fy = event.y;
            }
            function dragended(event, d) {
                if (!event.active) simulation.alphaTarget(0);
                d.fx = null; d.fy = null;
            }
            return d3.drag()
                .on("start", dragstarted)
                .on("drag", dragged)
                .on("end", dragended);
        }
    </script>
</body>
</html>
